# XcodeGen manifest — generates Autonomux.xcodeproj on a Mac.
# Run:  cd apps/ios && xcodegen generate && open Autonomux.xcodeproj
# (Install XcodeGen: brew install xcodegen)  — see BUILD_GUIDE.md.

name: Autonomux
options:
  bundleIdPrefix: io.autonomux
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.1"

targets:
  Autonomux:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: autonomux
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "AlterEgo uses the mic for voice input in chat."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.autonomux.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"

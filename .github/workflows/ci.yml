name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test

  security:
    name: secret scan · dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm
      - run: npm ci
      # Report high-severity vulns. Not yet a hard gate — flip to a failing
      # step once the baseline is clean (Phase 0 exit criterion).
      - name: Dependency audit (high)
        run: npm audit --audit-level=high
        continue-on-error: true

  static-analysis:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    # Semgrep's SARIF/CI runner. Uses the maintained rule packs for the
    # stack; findings fail the job (blocking on real security smells).
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: semgrep ci
        env:
          SEMGREP_RULES: >-
            p/typescript
            p/react
            p/nodejsscan
            p/secrets
            p/owasp-top-ten

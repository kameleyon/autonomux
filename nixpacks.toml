# Railway / Nixpacks build plan for @autonomux/worker.
#
# Why this file exists: the autonomux monorepo uses npm workspaces with a
# root-level package-lock.json. Nixpacks auto-detection guesses pnpm when
# no `packageManager` field is present (pinned at root) — this file makes
# the install command explicit so a future pin change doesn't silently
# re-shuffle the install path.
#
# Runtime model: worker uses `tsx` to run TypeScript source directly in
# production. We deliberately skip the tsc compile step because the
# shared @autonomux/{cipher,db,logger,telemetry} packages get consumed
# by BOTH Next.js (apps/web, bundler resolution — no .js extensions)
# AND the worker (Node ESM, requires .js extensions). Running source
# via tsx sidesteps that extension-resolution split entirely. Cost is
# ~50 ms of boot-time TS parsing on a long-running worker — irrelevant.
#
# Owner: [Pipeline]

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["echo 'autonomux: build phase intentionally a no-op for worker (tsx runtime)'"]

[start]
cmd = "npm run start --workspace=@autonomux/worker"
